<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quest Failed</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="src/hud/styles.css" />
</head>
<body>
<div id="game-container"></div>
<div id="hud-root" hidden><div id="hud-stage"></div></div>

<!--
  Boot loader — visible the moment the HTML parses (before Phaser even
  initializes). Uses the same Crypt CSS tokens as the rest of the HUD
  (.panel.bevel, --blood / --gold / --pix; the ornate red corner brackets
  were removed). The
  bar is filled by Preload._wireBootLoader (32 discrete blocks); the
  flavour line cycles per load category; the sconces sine-flicker via
  CSS keyframes. Removed from the DOM by Preload._dismissBootLoader
  once asset loading finishes.
-->
<div id="boot-loader" class="boot-loader" role="status" aria-live="polite">
  <div class="boot-loader__panel panel bevel">
    <div class="boot-loader__title">
      <i class="diamond gold sm"></i>
      <span>LOADING THE CRYPT</span>
      <i class="diamond gold sm"></i>
    </div>
    <div id="boot-loader-bar" class="boot-loader__bar" aria-label="Loading progress"></div>
    <div id="boot-loader-flavour" class="boot-loader__flavour">The dungeon stirs…</div>
  </div>
</div>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&family=Jersey+25&family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
